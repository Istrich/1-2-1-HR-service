<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 1-2-1</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--bg-s:#111114;--bg-e:#18181c;--bg-h:#1f1f25;
  --brd:#27272e;--brd-h:#38383f;
  --tx:#e4e4e7;--tx2:#9898a4;--tx3:#5c5c66;
  --am:#d4a052;--am-h:#e0b46a;--am-dim:rgba(212,160,82,.1);--am-dim2:rgba(212,160,82,.18);
  --gn:#4ade80;--gn-dim:rgba(74,222,128,.1);
  --rd:#f87171;--rd-dim:rgba(248,113,113,.1);
  --bl:#60a5fa;--bl-dim:rgba(96,165,250,.1);
  --r:8px;--r2:14px;
  --f:'Instrument Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html{font-size:14px;height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100%;height:100%;margin:0;-webkit-font-smoothing:antialiased}
#root{min-height:100%;height:100%}
::selection{background:var(--am);color:#000}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}

/* ====== LOGIN ====== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;
  background:radial-gradient(ellipse 70% 40% at 50% 20%,rgba(212,160,82,.04),transparent),var(--bg)}
.login-box{width:100%;max-width:360px;background:var(--bg-s);border:1px solid var(--brd);border-radius:var(--r2);padding:2.2rem 1.8rem 1.8rem}
.login-box .logo{text-align:center;margin-bottom:2rem}
.login-box .logo h1{font-size:1.6rem;font-weight:700;letter-spacing:-.03em;color:var(--am)}
.login-box .logo p{color:var(--tx3);font-size:.82rem;margin-top:.25rem;letter-spacing:.04em;text-transform:uppercase}
.fld{margin-bottom:.9rem}
.fld label{display:block;font-size:.72rem;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem}
input[type="text"],input[type="password"],textarea{
  width:100%;padding:.6rem .8rem;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);
  color:var(--tx);font-family:var(--f);font-size:.92rem;outline:none;transition:border .15s}
input:focus,textarea:focus{border-color:var(--am);box-shadow:0 0 0 2px var(--am-dim)}
textarea{resize:vertical;min-height:120px;font-family:var(--mono);font-size:.8rem;line-height:1.6}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;padding:.55rem 1.1rem;
  font-family:var(--f);font-size:.85rem;font-weight:500;border:none;border-radius:var(--r);cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-am{background:var(--am);color:#0a0a0a}.btn-am:hover{background:var(--am-h)}.btn-am:disabled{opacity:.4;pointer-events:none}
.btn-s{background:var(--bg-e);color:var(--tx);border:1px solid var(--brd)}.btn-s:hover{border-color:var(--brd-h)}
.btn-g{background:transparent;color:var(--tx2);padding:.4rem .6rem}.btn-g:hover{color:var(--tx)}
.btn-gn{background:var(--gn-dim);color:var(--gn);border:1px solid rgba(74,222,128,.15)}.btn-gn:hover{background:rgba(74,222,128,.16)}
.btn-rd{background:var(--rd-dim);color:var(--rd);border:1px solid rgba(248,113,113,.15)}.btn-rd:hover{background:rgba(248,113,113,.16)}
.btn-full{width:100%}

.err{color:var(--rd);font-size:.82rem;text-align:center;margin-top:.5rem}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ====== SHELL ====== */
.shell{display:flex;flex-direction:column;min-height:100%;height:100%;max-height:100vh;overflow:hidden}
.topbar{height:52px;background:var(--bg-s);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 1.2rem;gap:1rem;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:1rem;color:var(--am);letter-spacing:-.02em;cursor:pointer}
.topbar .brand span{color:var(--tx3);font-weight:400;font-size:.82rem;margin-left:.5rem}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:.6rem}
.chip{padding:.3rem .7rem;border-radius:20px;font-size:.75rem;font-weight:500;background:var(--bg-e);color:var(--tx2);border:1px solid var(--brd);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--brd-h);color:var(--tx)}
.chip.active{background:var(--am-dim);color:var(--am);border-color:rgba(212,160,82,.25)}
.user-pill{display:flex;align-items:center;gap:.4rem;padding:.3rem .7rem .3rem .35rem;border-radius:20px;background:var(--bg-e);border:1px solid var(--brd);font-size:.78rem;color:var(--tx2)}
.user-dot{width:22px;height:22px;border-radius:50%;background:var(--am-dim);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--am);text-transform:uppercase}
.main-area{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto}
.main-area--workspace{overflow:hidden}

/* ====== UPLOAD ====== */
.upload-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.upload-container{width:100%;max-width:560px;text-align:center}
.upload-container h2{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
.upload-container .sub{color:var(--tx2);font-size:.9rem;margin-bottom:2rem}
.drop-zone{border:2px dashed var(--brd);border-radius:var(--r2);padding:3rem 2rem;cursor:pointer;transition:all .2s;background:var(--bg-s);position:relative}
.drop-zone:hover,.drop-zone.over{border-color:var(--am);background:var(--am-dim)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-zone .dz-icon{width:56px;height:56px;margin:0 auto 1rem;border-radius:50%;background:var(--am-dim);display:flex;align-items:center;justify-content:center}
.drop-zone h3{font-size:1rem;font-weight:500;margin-bottom:.25rem}
.drop-zone p{font-size:.82rem;color:var(--tx3)}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--tx3);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--brd)}
.url-row{display:flex;gap:.6rem}
.url-row input{flex:1}

/* ====== PROCESSING ====== */
.processing-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.proc-box{width:100%;max-width:420px;background:var(--bg-s);border:1px solid var(--brd);border-radius:var(--r2);padding:2rem}
.proc-box h3{font-size:1.1rem;font-weight:600;margin-bottom:1.2rem;text-align:center}
.proc-step{display:flex;align-items:center;gap:.7rem;padding:.5rem 0}
.proc-dot{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}
.proc-dot.pending{background:var(--bg-e);color:var(--tx3)}
.proc-dot.active{background:var(--am);color:#0a0a0a;animation:pulse 1.5s infinite}
.proc-dot.done{background:var(--gn);color:#0a0a0a}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,160,82,.35)}50%{box-shadow:0 0 0 8px rgba(212,160,82,0)}}
.proc-label{font-size:.88rem;color:var(--tx2)}
.proc-dot.active~.proc-label{color:var(--tx)}

/* ====== WORKSPACE ====== */
.workspace{flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);grid-template-rows:auto minmax(0,1fr);min-height:0;height:100%;max-height:100%;overflow:hidden;align-content:stretch}
.ws-audio{grid-column:1/-1;background:var(--bg-s);border-bottom:1px solid var(--brd);padding:.8rem 1.2rem;display:flex;align-items:center;gap:1rem;position:relative}
.ws-audio audio{position:absolute;width:0;height:0;opacity:0;pointer-events:none;overflow:hidden;clip:rect(0,0,0,0)}

.audio-play{width:36px;height:36px;border-radius:50%;background:var(--am);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.audio-play:hover{transform:scale(1.06)}
.audio-play:active{transform:scale(.96)}
.audio-play svg{color:#0a0a0a}

.audio-track{flex:1;position:relative;height:12px;background:var(--bg-e);border-radius:3px;cursor:pointer;touch-action:none}
.audio-fill{height:100%;background:var(--am);border-radius:3px;transition:width .1s linear;pointer-events:none}
.audio-time{font-family:var(--mono);font-size:.78rem;color:var(--tx3);flex-shrink:0;min-width:90px;text-align:right}

/* ====== TRANSCRIPT PANEL ====== */
.panel{min-height:0;min-width:0;height:100%;max-height:100%;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid var(--brd);align-self:stretch}
.panel:last-child{border-right:none}
.panel-head{padding:.7rem 1.2rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:.6rem;flex-shrink:0;background:var(--bg-s)}
.panel-head h3{font-size:.85rem;font-weight:600;letter-spacing:-.01em}
.panel-head .badge{font-size:.7rem;padding:.15rem .5rem;border-radius:10px;background:var(--am-dim);color:var(--am);font-weight:500}
.panel-toolbar{padding:.45rem 1.2rem;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--bg);display:flex;align-items:center;gap:.5rem}
.panel-toolbar input[type="search"]{flex:1;min-width:0;padding:.45rem .65rem;font-size:.82rem;background:var(--bg-e);border:1px solid var(--brd);border-radius:var(--r);color:var(--tx)}
.panel-toolbar input[type="search"]::placeholder{color:var(--tx3)}
.panel-toolbar .search-meta{font-size:.72rem;color:var(--tx3);white-space:nowrap}
.panel-toolbar .search-nav{display:flex;gap:.2rem}
.panel-toolbar .search-nav button{padding:.25rem .45rem;font-size:.75rem;min-width:auto}
.panel-body{flex:1;min-height:0;min-width:0;overflow:auto;overflow-x:auto;overflow-y:auto;overscroll-behavior:contain;padding:0}
mark.search-hit{background:rgba(212,160,82,.35);color:var(--tx);padding:0 .05em;border-radius:2px}
mark.search-hit-current{background:var(--am);color:#0a0a0a}

.seg{display:flex;gap:.6rem;padding:.55rem 1.2rem;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.seg:hover{background:rgba(255,255,255,.02)}
.seg.active{background:var(--am-dim);border-left-color:var(--am)}
.seg-time{font-family:var(--mono);font-size:.72rem;color:var(--am);flex-shrink:0;padding-top:.15rem;min-width:62px;opacity:.7;transition:opacity .1s}
.seg.active .seg-time,.seg:hover .seg-time{opacity:1}
.seg-text{font-size:.88rem;line-height:1.6;color:var(--tx2);min-width:0;overflow-wrap:break-word;word-wrap:break-word}
.seg.active .seg-text{color:var(--tx)}

/* ====== REPORT PANEL ====== */
.report-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;max-height:100%}
.report-scroll{flex:1;min-height:0;min-width:0;overflow:auto;overflow-x:auto;overflow-y:auto;overscroll-behavior:contain;padding:1.2rem;font-size:.88rem;line-height:1.75;color:var(--tx2)}
.report-content{white-space:pre-wrap;word-wrap:break-word}
.report-search-hint{font-size:.72rem;color:var(--tx3);margin-bottom:.6rem;font-style:italic}
.report-content h1,.report-content h2,.report-content h3{color:var(--tx);margin:1rem 0 .4rem;line-height:1.3}
.report-content h2{font-size:1rem;font-weight:600}
.report-content h3{font-size:.92rem;font-weight:600}
.report-editarea{width:100%;min-height:min(60vh,520px);min-width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);color:var(--tx);font-family:var(--mono);font-size:.85rem;line-height:1.65;padding:1rem;resize:vertical}
.refine-hint{font-size:.75rem;color:var(--tx3);line-height:1.45;margin-bottom:.55rem}

.refine-area{border-top:1px solid var(--brd);padding:.8rem 1.2rem;flex-shrink:0;background:var(--bg-s)}
.refine-area textarea{min-height:72px;width:100%;resize:vertical}
.refine-history{max-height:200px;overflow-y:auto;margin-bottom:.6rem}
.refine-msg{font-size:.8rem;padding:.45rem .7rem;border-radius:var(--r);margin-bottom:.4rem;max-width:85%}
.refine-msg.user{background:var(--am-dim);color:var(--am);margin-left:auto;text-align:right}
.refine-msg.ai{background:var(--bg-e);color:var(--tx2)}
.refine-input{display:flex;gap:.5rem}
.refine-input input{flex:1;font-size:.85rem;padding:.5rem .7rem}

.export-bar{border-top:1px solid var(--brd);padding:.6rem 1.2rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0;background:var(--bg-s)}

/* ====== SETTINGS OVERLAY ====== */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.overlay-box{width:100%;max-width:640px;max-height:85vh;background:var(--bg-s);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column}
.overlay-head{padding:1rem 1.4rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.overlay-head h2{font-size:1.05rem;font-weight:600}
.overlay-body{flex:1;overflow-y:auto;padding:1.4rem}
.prompt-block{margin-bottom:1.8rem}
.prompt-block h4{font-size:.85rem;font-weight:600;margin-bottom:.3rem;display:flex;align-items:center;gap:.4rem}
.prompt-block .hint{font-size:.75rem;color:var(--tx3);margin-bottom:.6rem}
.prompt-actions{display:flex;gap:.5rem;margin-top:.5rem}
.settings-block{margin-bottom:1.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--brd)}
.settings-block:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.settings-block h4{font-size:.88rem;font-weight:600;margin-bottom:.35rem}
.radio-row{display:flex;flex-wrap:wrap;gap:.6rem 1.2rem;margin:.5rem 0 .8rem}
.radio-row label{display:flex;align-items:center;gap:.35rem;cursor:pointer;font-size:.85rem;color:var(--tx2)}
.radio-row input{accent-color:var(--am)}

/* ====== TOAST ====== */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.65rem 1.1rem;background:var(--gn-dim);color:var(--gn);border:1px solid rgba(74,222,128,.2);border-radius:var(--r);font-size:.82rem;z-index:999;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ====== RESPONSIVE ====== */
@media(max-width:800px){
  .workspace{grid-template-columns:1fr;grid-template-rows:auto minmax(0,1fr) minmax(0,1fr);height:100%;max-height:100%}
  .panel{border-right:none;border-bottom:1px solid var(--brd);max-height:none;min-height:0}
  .panel:last-child{border-bottom:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const API='';
const TOKEN_KEY='hr121_token';
const USER_KEY='hr121_user';
function getToken(){
  let t=localStorage.getItem(TOKEN_KEY);
  if(!t){const o=localStorage.getItem('hr_t');if(o){localStorage.setItem(TOKEN_KEY,o);localStorage.removeItem('hr_t');t=o}}
  return t;
}
const hdr=()=>({Authorization:`Bearer ${getToken()}`});
async function apiFetch(p,o={}){
  const r=await fetch(API+p,{...o,headers:{...hdr(),...(o.headers||{})}});
  if(r.status===401){localStorage.removeItem(TOKEN_KEY);localStorage.removeItem(USER_KEY);localStorage.removeItem('hr_t');localStorage.removeItem('hr_u');location.reload();throw new Error('401')}
  return r;
}

/* ===== SVG Icons ===== */
const I={
  up:<svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  play:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  pause:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
  dl:<svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  send:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  x:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  gear:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  mail:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>,
  check:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  back:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  out:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
};

/* ===== Markdown renderer (lightweight) ===== */
function renderMd(text){
  if(!text)return null;
  return text.split('\n').map((line,i)=>{
    let s=line.trimStart();
    if(s.startsWith('### '))return <h3 key={i} style={{color:'var(--tx)',fontSize:'.92rem',fontWeight:600,margin:'.8rem 0 .25rem'}}>{parseBold(s.slice(4))}</h3>;
    if(s.startsWith('## '))return <h2 key={i} style={{color:'var(--tx)',fontSize:'1rem',fontWeight:600,margin:'1rem 0 .3rem'}}>{parseBold(s.slice(3))}</h2>;
    if(s.startsWith('# '))return <h2 key={i} style={{color:'var(--tx)',fontSize:'1.05rem',fontWeight:700,margin:'1.1rem 0 .3rem'}}>{parseBold(s.slice(2))}</h2>;
    if(s.startsWith('- ')||s.startsWith('• '))return <div key={i} style={{paddingLeft:'1rem',position:'relative',margin:'.15rem 0'}}><span style={{position:'absolute',left:0,color:'var(--am)'}}>·</span>{parseBold(s.slice(2))}</div>;
    if(s==='')return <div key={i} style={{height:'.5rem'}}/>;
    if(/^[-*_]{3,}$/.test(s))return <hr key={i} style={{border:'none',borderTop:'1px solid var(--brd)',margin:'.6rem 0'}}/>;
    return <div key={i} style={{margin:'.1rem 0'}}>{parseBold(s)}</div>;
  });
}
function parseBold(t){
  const parts=t.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p,i)=>p.startsWith('**')&&p.endsWith('**')?<strong key={i} style={{color:'var(--tx)',fontWeight:600}}>{p.slice(2,-2)}</strong>:<span key={i}>{p}</span>);
}

function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function buildTranscriptMatchMeta(segments,q){
  const qn=(q||'').trim();
  if(!qn||!segments||!segments.length)return[];
  const out=[];let gid=0;
  segments.forEach((seg,segIndex)=>{
    const t=seg.text||'';
    const r=new RegExp(escapeRegExp(qn),'gi');
    let m;
    while((m=r.exec(t))!==null){
      out.push({globalIdx:gid++,segIndex,start:m.index,end:m.index+m[0].length});
      if(m.index===r.lastIndex)r.lastIndex++;
    }
  });
  return out;
}

function buildPlainMatchMeta(text,q){
  const qn=(q||'').trim();
  if(!qn)return[];
  const t=text||'';
  const r=new RegExp(escapeRegExp(qn),'gi');
  const out=[];let gid=0;
  let m;
  while((m=r.exec(t))!==null){
    out.push({globalIdx:gid++,start:m.index,end:m.index+m[0].length});
    if(m.index===r.lastIndex)r.lastIndex++;
  }
  return out;
}

function SegmentHighlighted({text,segIndex,metas,activeGid}){
  const ms=metas.filter(x=>x.segIndex===segIndex).sort((a,b)=>a.start-b.start);
  if(!ms.length)return <span className="seg-text">{text}</span>;
  const out=[];let pos=0;
  ms.forEach((m,i)=>{
    if(pos<m.start)out.push(<span key={'p'+i}>{text.slice(pos,m.start)}</span>);
    const cls=m.globalIdx===activeGid?'search-hit-current':'search-hit';
    out.push(<mark key={m.start} className={cls}>{text.slice(m.start,m.end)}</mark>);
    pos=m.end;
  });
  if(pos<text.length)out.push(<span key="tail">{text.slice(pos)}</span>);
  return <span className="seg-text">{out}</span>;
}

function ReportPlainHighlighted({text,metas,activeGid}){
  const sorted=[...metas].sort((a,b)=>a.start-b.start);
  if(!sorted.length)return <div className="report-content" style={{whiteSpace:'pre-wrap'}}>{text}</div>;
  const out=[];let pos=0;
  sorted.forEach((m,i)=>{
    if(pos<m.start)out.push(<span key={'p'+i}>{text.slice(pos,m.start)}</span>);
    const cls=m.globalIdx===activeGid?'search-hit-current':'search-hit';
    out.push(<mark key={m.start} data-match-gid={m.globalIdx} className={cls}>{text.slice(m.start,m.end)}</mark>);
    pos=m.end;
  });
  if(pos<text.length)out.push(<span key="tail">{text.slice(pos)}</span>);
  return <div className="report-content" style={{whiteSpace:'pre-wrap'}}>{out}</div>;
}

/* ===== AUDIO PLAYER ===== */
function AudioPlayer({src,audioRef}){
  const[playing,setPlaying]=useState(false);
  const[progress,setProgress]=useState(0);
  const[curTime,setCurTime]=useState('00:00');
  const[durTime,setDurTime]=useState('00:00');
  const trackRef=useRef(null);

  useEffect(()=>{
    const a=audioRef.current;if(!a)return;
    const onPlay=()=>setPlaying(true);
    const onPause=()=>setPlaying(false);
    const onTime=()=>{
      const d=a.duration;
      if(d&&isFinite(d)&&d>0){setProgress((a.currentTime/d)*100);setCurTime(fmt(a.currentTime))}
    };
    const onMeta=()=>{
      const d=a.duration;
      if(d&&isFinite(d))setDurTime(fmt(d));
    };
    a.addEventListener('play',onPlay);a.addEventListener('pause',onPause);
    a.addEventListener('timeupdate',onTime);a.addEventListener('loadedmetadata',onMeta);
    a.addEventListener('durationchange',onMeta);
    return()=>{a.removeEventListener('play',onPlay);a.removeEventListener('pause',onPause);a.removeEventListener('timeupdate',onTime);a.removeEventListener('loadedmetadata',onMeta);a.removeEventListener('durationchange',onMeta)};
  },[src,audioRef]);

  function fmt(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}

  function toggle(){const a=audioRef.current;if(!a)return;playing?a.pause():a.play()}

  function seekAtClientX(clientX){
    const a=audioRef.current;const t=trackRef.current;if(!a||!t)return;
    const d=a.duration;
    if(!d||!isFinite(d)||d<=0)return;
    const rect=t.getBoundingClientRect();
    if(rect.width<=0)return;
    const x=Math.max(0,Math.min(clientX-rect.left,rect.width));
    a.currentTime=(x/rect.width)*d;
  }

  function onTrackPointerDown(e){
    if(e.button!==0)return;
    e.preventDefault();
    e.stopPropagation();
    const pid=e.pointerId;
    seekAtClientX(e.clientX);
    const move=(ev)=>{
      if(ev.pointerId===pid)seekAtClientX(ev.clientX);
    };
    const up=(ev)=>{
      if(ev.pointerId!==pid)return;
      window.removeEventListener('pointermove',move);
      window.removeEventListener('pointerup',up);
      window.removeEventListener('pointercancel',up);
    };
    window.addEventListener('pointermove',move);
    window.addEventListener('pointerup',up);
    window.addEventListener('pointercancel',up);
  }

  return(
    <div className="ws-audio">
      <audio ref={audioRef} src={src} preload="auto" playsInline/>
      <button type="button" className="audio-play" onClick={(e)=>{e.stopPropagation();toggle();}}>{playing?I.pause:I.play}</button>
      <div className="audio-track" ref={trackRef} onPointerDown={onTrackPointerDown} role="slider" aria-label="Позиция воспроизведения" tabIndex={0}
        onKeyDown={(e)=>{
          const a=audioRef.current;if(!a||!a.duration)return;
          const step=Math.min(5,a.duration*0.02);
          if(e.key==='ArrowLeft'||e.key==='ArrowDown'){e.preventDefault();a.currentTime=Math.max(0,a.currentTime-step)}
          if(e.key==='ArrowRight'||e.key==='ArrowUp'){e.preventDefault();a.currentTime=Math.min(a.duration,a.currentTime+step)}
        }}>
        <div className="audio-fill" style={{width:`${progress}%`}}/>
      </div>
      <div className="audio-time">{curTime} / {durTime}</div>
    </div>
  );
}

/* ===== WORKSPACE ===== */
function Workspace({data,onReset}){
  const audioRef=useRef(null);
  const[activeSeg,setActiveSeg]=useState(-1);
  const[report,setReport]=useState(data.report||'');
  const[reportEditMode,setReportEditMode]=useState(false);
  const[refineHistory,setRefineHistory]=useState([]);
  const[refineText,setRefineText]=useState('');
  const[refining,setRefining]=useState(false);
  const[exporting,setExporting]=useState(false);
  const[exportLink,setExportLink]=useState('');
  const[emailText,setEmailText]=useState('');
  const[emailLoading,setEmailLoading]=useState(false);
  const[toast,setToast]=useState('');
  const[transcriptQ,setTranscriptQ]=useState('');
  const[transcriptCur,setTranscriptCur]=useState(0);
  const[reportQ,setReportQ]=useState('');
  const[reportCur,setReportCur]=useState(0);
  const segRefs=useRef([]);
  const transcriptRef=useRef(null);
  const reportScrollRef=useRef(null);

  const segments=data.segments||[];
  const transcriptMeta=useMemo(()=>buildTranscriptMatchMeta(segments,transcriptQ),[segments,transcriptQ]);
  const reportPlainForSearch=emailText||report;
  const reportMeta=useMemo(()=>buildPlainMatchMeta(reportPlainForSearch,reportQ),[reportPlainForSearch,reportQ]);

  useEffect(()=>{ setReport(data.report||''); },[data.report]);

  useEffect(()=>{ setTranscriptCur(0); },[transcriptQ]);
  useEffect(()=>{ setReportCur(0); },[reportQ,emailText]);

  useEffect(()=>{
    if(!transcriptMeta.length)return;
    setTranscriptCur(c=>Math.min(c,transcriptMeta.length-1));
  },[transcriptMeta.length]);

  useEffect(()=>{
    if(!reportMeta.length)return;
    setReportCur(c=>Math.min(c,reportMeta.length-1));
  },[reportMeta.length]);

  useEffect(()=>{
    if(!transcriptMeta.length||!(transcriptQ||'').trim())return;
    const cur=transcriptMeta[transcriptCur];
    if(cur==null)return;
    const el=segRefs.current[cur.segIndex];
    if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
  },[transcriptCur,transcriptMeta,transcriptQ]);

  useEffect(()=>{
    if(!reportMeta.length||!(reportQ||'').trim())return;
    const cur=reportMeta[reportCur];
    if(cur==null)return;
    const host=reportScrollRef.current;
    if(!host)return;
    const mark=host.querySelector(`[data-match-gid="${cur.globalIdx}"]`);
    if(mark)mark.scrollIntoView({block:'nearest',behavior:'smooth'});
  },[reportCur,reportMeta,reportQ]);

  // Sync active segment with audio time (no activeSeg in deps — avoids stale listener)
  useEffect(()=>{
    const a=audioRef.current;if(!a||!data.segments?.length)return;
    const onTime=()=>{
      const t=a.currentTime;
      const idx=data.segments.findIndex((s,i)=>{
        const next=data.segments[i+1];
        const st=Number(s.start);
        const nst=next?Number(next.start):null;
        return t>=st&&(nst!=null&&!Number.isNaN(nst)?t<nst:true);
      });
      if(idx>=0)setActiveSeg(idx);
    };
    a.addEventListener('timeupdate',onTime);
    return()=>a.removeEventListener('timeupdate',onTime);
  },[data.segments]);

  function seekTo(sec,idx){
    const a=audioRef.current;
    if(!a)return;
    const t=Math.max(0,Number(sec));
    if(Number.isNaN(t))return;
    setActiveSeg(idx);

    const playSafe=()=>{void a.play().catch(()=>{});};

    const performSeek=()=>{
      let settled=false;
      const finish=()=>{
        if(settled)return;
        settled=true;
        playSafe();
      };
      const onSeeked=()=>{
        a.removeEventListener('seeked',onSeeked);
        finish();
      };
      a.addEventListener('seeked',onSeeked,{once:true});
      try{
        a.currentTime=t;
      }catch(_){
        finish();
        return;
      }
      window.setTimeout(()=>{
        a.removeEventListener('seeked',onSeeked);
        finish();
      },250);
    };

    const HAVE_META=typeof HTMLMediaElement!=='undefined'?HTMLMediaElement.HAVE_METADATA:1;
    const canSeek=()=>a.readyState>=HAVE_META&&a.duration>0&&isFinite(a.duration);
    if(canSeek()){
      performSeek();
    }else{
      let done=false;
      const go=()=>{
        if(done)return;
        done=true;
        a.removeEventListener('loadedmetadata',go);
        a.removeEventListener('canplay',go);
        if(canSeek())performSeek();
        else playSafe();
      };
      a.addEventListener('loadedmetadata',go);
      a.addEventListener('canplay',go);
    }
  }

  useEffect(()=>{
    if(activeSeg<0||!segRefs.current[activeSeg]||!transcriptRef.current)return;
    if((transcriptQ||'').trim())return;
    const el=segRefs.current[activeSeg];
    const container=transcriptRef.current;
    const top=el.offsetTop-container.offsetTop-80;
    container.scrollTo({top,behavior:'smooth'});
  },[activeSeg,transcriptQ]);

  function nextTranscriptMatch(){
    if(!transcriptMeta.length)return;
    setTranscriptCur(c=>(c+1)%transcriptMeta.length);
  }
  function prevTranscriptMatch(){
    if(!transcriptMeta.length)return;
    setTranscriptCur(c=>(c-1+transcriptMeta.length)%transcriptMeta.length);
  }
  function nextReportMatch(){
    if(!reportMeta.length)return;
    setReportCur(c=>(c+1)%reportMeta.length);
  }
  function prevReportMatch(){
    if(!reportMeta.length)return;
    setReportCur(c=>(c-1+reportMeta.length)%reportMeta.length);
  }

  async function doRefine(){
    if(!refineText.trim())return;
    const comment=refineText.trim();
    setRefineHistory(h=>[...h,{role:'user',text:comment}]);
    setRefineText('');setRefining(true);
    try{
      const r=await apiFetch('/api/refine',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({comment,current_report:report}),
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d.detail||'Ошибка');
      setReport(d.report);
      setRefineHistory(h=>[...h,{role:'ai',text:'Отчёт обновлён'}]);
      setExportLink('');
    }catch(e){
      setRefineHistory(h=>[...h,{role:'ai',text:`Ошибка: ${e.message}`}]);
    }finally{setRefining(false)}
  }

  async function doExport(){
    setExporting(true);
    try{
      const r=await apiFetch('/api/export/docx',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({report_text:report}),
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d.detail||'Ошибка');
      setExportLink(d.file);
      showToast('Word-документ готов');
    }catch(e){showToast('Ошибка: '+e.message)}
    finally{setExporting(false)}
  }

  async function doEmail(){
    setEmailLoading(true);
    try{
      const r=await apiFetch('/api/email',{method:'POST'});
      const d=await r.json();if(!r.ok)throw new Error(d.detail);
      setEmailText(d.email_text);
    }catch(e){showToast('Ошибка: '+e.message)}
    finally{setEmailLoading(false)}
  }

  function showToast(m){setToast(m);setTimeout(()=>setToast(''),3000)}

  const tq=(transcriptQ||'').trim();
  const rq=(reportQ||'').trim();

  return(
    <div className="workspace">
      <AudioPlayer src={data.audio_file} audioRef={audioRef}/>

      <div className="panel">
        <div className="panel-head">
          <h3>Транскрипт</h3>
          <span className="badge">{segments.length} сегм.</span>
        </div>
        <PanelSearchToolbar
          value={transcriptQ}
          onChange={setTranscriptQ}
          matchCount={transcriptMeta.length}
          currentIdx={transcriptCur}
          onPrev={prevTranscriptMatch}
          onNext={nextTranscriptMatch}
          placeholder="Поиск по диалогу…"
        />
        <div className="panel-body" ref={transcriptRef}>
          {segments.map((seg,i)=>(
            <div key={i} ref={el=>segRefs.current[i]=el}
              className={`seg${i===activeSeg?' active':''}`}
              onClick={()=>seekTo(seg.start!=null?seg.start:0,i)} role="button" tabIndex={0}
              onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();seekTo(seg.start!=null?seg.start:0,i);}}}>
              <span className="seg-time">{seg.start_fmt}</span>
              {tq?(
                <SegmentHighlighted text={seg.text} segIndex={i} metas={transcriptMeta} activeGid={transcriptMeta[transcriptCur]?.globalIdx}/>
              ):(
                <span className="seg-text">{seg.text}</span>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className="panel" style={{borderRight:'none'}}>
        <div className="panel-head">
          <h3>{emailText?'Письмо':'Отчёт'}</h3>
          <div style={{marginLeft:'auto',display:'flex',gap:'.4rem',alignItems:'center'}}>
            {!emailText&&<button type="button" className="btn btn-g" onClick={()=>{setReportEditMode(m=>{if(!m)setReportQ('');return !m;});}} title={reportEditMode?'Просмотр с оформлением':'Редактировать текст отчёта'}>
              {reportEditMode?'Просмотр':'Редактировать'}
            </button>}
            {!emailText&&<button type="button" className="btn btn-g" onClick={doEmail} disabled={emailLoading} title="Письмо с договорённостями">
              {emailLoading?<span className="spinner"/>:I.mail}
            </button>}
          </div>
        </div>
        {emailText?(
        <PanelSearchToolbar
          value={reportQ}
          onChange={setReportQ}
          matchCount={reportMeta.length}
          currentIdx={reportCur}
          onPrev={prevReportMatch}
          onNext={nextReportMatch}
          placeholder="Поиск по письму…"
        />
        ):(!reportEditMode&&(
        <PanelSearchToolbar
          value={reportQ}
          onChange={setReportQ}
          matchCount={reportMeta.length}
          currentIdx={reportCur}
          onPrev={prevReportMatch}
          onNext={nextReportMatch}
          placeholder="Поиск по отчёту…"
        />))}
        <div className="report-body">
          <div className="report-scroll" ref={reportScrollRef}>
            {emailText?(
              <>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.8rem',flexShrink:0}}>
                  <h2 style={{margin:0,fontSize:'1rem'}}>Письмо с договорённостями</h2>
                  <button className="btn btn-g" onClick={()=>setEmailText('')} style={{fontSize:'.78rem'}}>{I.back} К отчёту</button>
                </div>
                {rq?(
                  <ReportPlainHighlighted text={emailText} metas={reportMeta} activeGid={reportMeta[reportCur]?.globalIdx}/>
                ):(
                  <div className="report-content" style={{whiteSpace:'pre-wrap',lineHeight:1.7}}>{emailText}</div>
                )}
              </>
            ):reportEditMode?(
              <textarea className="report-editarea" value={report} onChange={e=>setReport(e.target.value)} spellCheck={false} placeholder="Текст отчёта (Markdown). Можно править вручную, затем отправить запрос на доработку через ИИ ниже."/>
            ):rq?(
              <>
                <p className="report-search-hint">При активном поиске показан текст отчёта с подсветкой (без оформления markdown).</p>
                <ReportPlainHighlighted text={report} metas={reportMeta} activeGid={reportMeta[reportCur]?.globalIdx}/>
              </>
            ):(
              <div className="report-content">{renderMd(report)}</div>
            )}
          </div>

          {!emailText&&(
            <div className="refine-area">

              <p className="refine-hint">На сервер уходят полная транскрипция интервью, текущий текст отчёта (включая правки в режиме «Редактировать») и ваше сообщение ниже. Опишите, что изменить или дополнить — отчёт будет перегенерирован с учётом этого запроса.</p>
              {refineHistory.length>0&&(
                <div className="refine-history">
                  {refineHistory.map((m,i)=>(
                    <div key={i} className={`refine-msg ${m.role}`}>{m.text}</div>
                  ))}
                </div>
              )}
              <div className="refine-input" style={{alignItems:'flex-end'}}>
                <textarea
                  placeholder="Например: «Сделай акцент на рисках ухода» или «Добавь раздел про обучение»…"
                  value={refineText}
                  onChange={e=>setRefineText(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!refining&&refineText.trim())doRefine();}}}
                  disabled={refining}
                  rows={3}
                />
                <button className="btn btn-am" onClick={doRefine} disabled={refining||!refineText.trim()} style={{alignSelf:'stretch'}}>
                  {refining?<span className="spinner"/>:I.send}
                </button>
              </div>
            </div>
          )}

          {!emailText&&(
            <div className="export-bar">
              <button className="btn btn-gn" onClick={doExport} disabled={exporting}>
                {exporting?<><span className="spinner"/> Экспорт…</>:<>{I.dl} Выгрузить в Word</>}
              </button>
              {exportLink&&<a href={exportLink} download className="btn btn-s" style={{textDecoration:'none'}}>{I.dl} Скачать .docx</a>}
              <button className="btn btn-g" onClick={onReset} style={{marginLeft:'auto',fontSize:'.78rem'}}>{I.back} Новая запись</button>
            </div>
          )}
        </div>
      </div>

      {toast&&<div className="toast">{I.check} {toast}</div>}
    </div>
  );
}

/* ===== SETTINGS MODAL ===== */
function SettingsModal({onClose}){
  const[rp,setRp]=useState('');const[ep,setEp]=useState('');
  const[drp,setDrp]=useState('');const[dep,setDep]=useState('');
  const[saving,setSaving]=useState('');const[msg,setMsg]=useState('');

  useEffect(()=>{
    apiFetch('/api/prompts').then(r=>r.json()).then(d=>{
      setRp(d.report_prompt);setEp(d.email_prompt);setDrp(d.default_report_prompt);setDep(d.default_email_prompt);
    });
  },[]);

  async function save(type,text){
    setSaving(type);
    await apiFetch('/api/prompts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt_type:type,text})});
    setSaving('');setMsg('Сохранено');setTimeout(()=>setMsg(''),2000);
  }
  async function reset(type){
    const t=type==='report'?drp:dep;
    type==='report'?setRp(t):setEp(t);
    await apiFetch('/api/prompts/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt_type:type,text:''})});
    setMsg('Сброшено');setTimeout(()=>setMsg(''),2000);
  }

  return(
    <div className="overlay-bg" onClick={onClose}>
      <div className="overlay-box" onClick={e=>e.stopPropagation()}>
        <div className="overlay-head">
          <h2>Настройка промтов</h2>
          <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
            {msg&&<span style={{fontSize:'.8rem',color:'var(--gn)'}}>{I.check} {msg}</span>}
            <button className="btn btn-g" onClick={onClose}>{I.x}</button>
          </div>
        </div>
        <div className="overlay-body">
          <div className="prompt-block">
            <h4>Промт для отчёта</h4>
            <p className="hint">User-инструкция при генерации HR-отчёта по транскрипции</p>
            <textarea rows="10" value={rp} onChange={e=>setRp(e.target.value)}/>
            <div className="prompt-actions">
              <button className="btn btn-am" onClick={()=>save('report',rp)} disabled={saving==='report'}>
                {saving==='report'?<span className="spinner"/>:'Сохранить'}
              </button>
              <button className="btn btn-rd" onClick={()=>reset('report')}>Сбросить</button>
            </div>
          </div>
          <div className="prompt-block">
            <h4>Промт для письма</h4>
            <p className="hint">Инструкция для генерации делового письма сотруднику</p>
            <textarea rows="8" value={ep} onChange={e=>setEp(e.target.value)}/>
            <div className="prompt-actions">
              <button className="btn btn-am" onClick={()=>save('email',ep)} disabled={saving==='email'}>
                {saving==='email'?<span className="spinner"/>:'Сохранить'}
              </button>
              <button className="btn btn-rd" onClick={()=>reset('email')}>Сбросить</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== API / ИИ SETTINGS MODAL ===== */
function ApiSettingsModal({onClose}){
  const[reportAi,setReportAi]=useState('openai');
  const[whisperBack,setWhisperBack]=useState('local');
  const[whisperModel,setWhisperModel]=useState('small');
  const[openaiKey,setOpenaiKey]=useState('');
  const[deepseekKey,setDeepseekKey]=useState('');
  const[openaiKeySet,setOpenaiKeySet]=useState(false);
  const[deepseekKeySet,setDeepseekKeySet]=useState(false);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');

  useEffect(()=>{
    apiFetch('/api/settings/runtime').then(r=>r.json()).then(d=>{
      setReportAi(d.report_ai_provider||'openai');
      setWhisperBack(d.whisper_backend||'local');
      setWhisperModel(d.whisper_model||'small');
      setOpenaiKeySet(!!d.openai_key_set);
      setDeepseekKeySet(!!d.deepseek_key_set);
    });
  },[]);

  async function saveAll(){
    setSaving(true);setMsg('');
    try{
      const body={
        report_ai_provider:reportAi,
        whisper_backend:whisperBack,
        whisper_model:whisperModel.trim()||'small',
      };
      if(openaiKey.trim()) body.openai_api_key=openaiKey.trim();
      if(deepseekKey.trim()) body.deepseek_api_key=deepseekKey.trim();
      const r=await apiFetch('/api/settings/runtime',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body),
      });
      if(!r.ok){const d=await r.json();throw new Error(d.detail||'Ошибка сохранения')}
      setOpenaiKey('');setDeepseekKey('');
      const r2=await apiFetch('/api/settings/runtime');
      const d2=await r2.json();
      setOpenaiKeySet(!!d2.openai_key_set);
      setDeepseekKeySet(!!d2.deepseek_key_set);
      setMsg('Сохранено в .env');
      setTimeout(()=>setMsg(''),2500);
    }catch(e){setMsg(e.message)}
    finally{setSaving(false)}
  }

  return(
    <div className="overlay-bg" onClick={onClose}>
      <div className="overlay-box" onClick={e=>e.stopPropagation()} style={{maxWidth:'520px'}}>
        <div className="overlay-head">
          <h2>ИИ и API</h2>
          <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
            {msg&&<span style={{fontSize:'.8rem',color:msg.startsWith('Сохранено')?'var(--gn)':'var(--rd)'}}>{msg}</span>}
            <button className="btn btn-g" onClick={onClose}>{I.x}</button>
          </div>
        </div>
        <div className="overlay-body">
          <div className="settings-block">
            <h4>Транскрипция</h4>
            <p className="hint">Локальный Whisper или облачный Whisper API OpenAI (нужен ключ OpenAI ниже).</p>
            <div className="radio-row">
              <label><input type="radio" name="wb" checked={whisperBack==='local'} onChange={()=>setWhisperBack('local')}/> Локальный Whisper</label>
              <label><input type="radio" name="wb" checked={whisperBack==='api'} onChange={()=>setWhisperBack('api')}/> OpenAI Whisper API</label>
            </div>
            {whisperBack==='local'&&(
              <div className="fld">
                <label>Модель (tiny / base / small / medium…)</label>
                <input type="text" value={whisperModel} onChange={e=>setWhisperModel(e.target.value)} placeholder="small"/>
              </div>
            )}
          </div>

          <div className="settings-block">
            <h4>Отчёт и письмо</h4>
            <p className="hint">Используется Chat Completions: OpenAI (gpt-4o по умолчанию) или DeepSeek.</p>
            <div className="radio-row">
              <label><input type="radio" name="rai" checked={reportAi==='openai'} onChange={()=>setReportAi('openai')}/> OpenAI</label>
              <label><input type="radio" name="rai" checked={reportAi==='deepseek'} onChange={()=>setReportAi('deepseek')}/> DeepSeek</label>
            </div>
          </div>

          <div className="settings-block">
            <h4>Ключи API</h4>
            <p className="hint">Сохраняются в файл .env на сервере. Пустое поле — не менять сохранённый ключ.</p>
            <div className="fld">
              <label>OpenAI {openaiKeySet&&<span style={{color:'var(--gn)',fontSize:'.72rem'}}> (ключ задан)</span>}</label>
              <input type="password" autoComplete="off" value={openaiKey} onChange={e=>setOpenaiKey(e.target.value)} placeholder={openaiKeySet?'Новый ключ или оставьте пустым':'sk-…'}/>
            </div>
            <div className="fld">
              <label>DeepSeek {deepseekKeySet&&<span style={{color:'var(--gn)',fontSize:'.72rem'}}> (ключ задан)</span>}</label>
              <input type="password" autoComplete="off" value={deepseekKey} onChange={e=>setDeepseekKey(e.target.value)} placeholder={deepseekKeySet?'Новый ключ или оставьте пустым':'sk-…'}/>
            </div>
            <div className="prompt-actions">
              <button className="btn btn-am" onClick={saveAll} disabled={saving}>{saving?<span className="spinner"/>:'Сохранить в .env'}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== APP ===== */
function App(){
  const[user,setUser]=useState(()=>localStorage.getItem(USER_KEY)||localStorage.getItem('hr_u'));
  const[view,setView]=useState('upload'); // upload | processing | workspace
  const[step,setStep]=useState(0);
  const[wsData,setWsData]=useState(null);
  const[error,setError]=useState('');
  const[settings,setSettings]=useState(false);
  const[apiSettings,setApiSettings]=useState(false);

  function logout(){localStorage.removeItem(TOKEN_KEY);localStorage.removeItem(USER_KEY);localStorage.removeItem('hr_t');localStorage.removeItem('hr_u');setUser(null)}

  async function handleProcess({type,file,url}){
    setView('processing');setStep(0);setError('');
    const timer=setInterval(()=>setStep(s=>Math.min(s+1,3)),7000);
    try{
      let r;
      if(type==='file'){
        const fd=new FormData();fd.append('file',file);
        r=await apiFetch('/api/process/upload',{method:'POST',body:fd});
      }else{
        const fd=new FormData();fd.append('url',url);
        r=await apiFetch('/api/process/url',{method:'POST',body:fd});
      }
      if(!r.ok){const d=await r.json();throw new Error(d.detail||'Ошибка обработки');}
      const data=await r.json();
      setWsData(data);setView('workspace');
    }catch(e){
      setError(e.message);setView('upload');
    }finally{
      clearInterval(timer);
    }
  }

  function handleReset(){setView('upload');setWsData(null);setError('')}

  if(!user)return<Login onLogin={setUser}/>;

  return(
    <div className="shell">
      <div className="topbar">
        <div className="brand" onClick={()=>view!=='processing'&&handleReset()} style={{cursor:view==='processing'?'default':'pointer',opacity:view==='processing'?0.65:1}} title={view==='processing'?'Дождитесь окончания обработки':'На главную'}>HR 1-2-1<span>аналитика</span></div>
        <div className="topbar-r">
          <button className="chip" type="button" onClick={()=>setApiSettings(true)}>ИИ и API</button>
          <button className="chip" type="button" onClick={()=>setSettings(true)}>{I.gear} Промты</button>
          <div className="user-pill">
            <div className="user-dot">{user[0]}</div>
            {user}
          </div>
          <button className="btn btn-g" onClick={logout} title="Выйти">{I.out}</button>
        </div>
      </div>

      <div className={'main-area'+(view==='workspace'?' main-area--workspace':'')}>
        {error&&<div style={{padding:'.8rem 1.2rem',background:'var(--rd-dim)',color:'var(--rd)',fontSize:'.85rem',borderBottom:'1px solid rgba(248,113,113,.15)'}}>⚠ {error}<button className="btn btn-g" onClick={()=>setError('')} style={{marginLeft:'.5rem',verticalAlign:'middle'}}>{I.x}</button></div>}

        {view==='upload'&&<UploadPage onProcess={handleProcess}/>}
        {view==='processing'&&<ProcessingPage step={step}/>}
        {view==='workspace'&&wsData&&<Workspace data={wsData} onReset={handleReset}/>}
      </div>

      {settings&&<SettingsModal onClose={()=>setSettings(false)}/>}
      {apiSettings&&<ApiSettingsModal onClose={()=>setApiSettings(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
